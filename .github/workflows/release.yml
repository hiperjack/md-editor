name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'   # Apple Silicon (M1 以降)
            args: '--target aarch64-apple-darwin'
          - platform: 'macos-latest'   # Intel Mac
            args: '--target x86_64-apple-darwin'
          - platform: 'ubuntu-22.04'   # Linux x64
            args: ''
          - platform: 'windows-latest' # Windows x64
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          # mac の 2 ターゲットは macOS ランナーでのみ使用
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: install frontend dependencies
        run: npm ci

      # フロントのビルド（vite build）は tauri.conf.json の build.beforeBuildCommand
      # （npm run build）で実行されるため、ここでの追加ビルドは不要。

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # push したタグ（v1.2.9 等）の Release にそのまま添付する
          tagName: ${{ github.ref_name }}
          releaseName: ${{ github.ref_name }}
          releaseBody: 'See the assets to download and install this version.'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      # Windows 向け Portable 版（インストール不要）。exe + README + LICENSE を zip 化し、
      # 同じタグの Release に添付する。タグ push 時のみ実行。
      - name: build Windows portable zip
        if: matrix.platform == 'windows-latest' && startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          $version = (Get-Content package.json -Raw | ConvertFrom-Json).version
          $staging = "mdedit_${version}_x64_portable"
          New-Item -ItemType Directory -Force -Path $staging | Out-Null
          Copy-Item "src-tauri/target/release/mdedit.exe" "$staging/"
          Copy-Item "README.md"    "$staging/"
          Copy-Item "README.ja.md" "$staging/"
          Copy-Item "LICENSE"      "$staging/"
          Compress-Archive -Path "$staging/*" -DestinationPath "$staging.zip" -Force
          "PORTABLE_ZIP=$staging.zip" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: upload portable zip to release
        if: matrix.platform == 'windows-latest' && startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload ${{ github.ref_name }} "$env:PORTABLE_ZIP" --clobber
